version: "3.9"

# =============================================================================
# Development overrides — extends docker-compose.yml
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command:
      - uvicorn
      - api.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --log-level
      - debug
    environment:
      DEBUG: "true"
      LOG_FORMAT: "console"
      LOG_LEVEL: "DEBUG"
      WORKERS: "1"
    volumes:
      # Hot-reload: mount source into container
      - ./liuyao:/app/liuyao:ro
      - ./api:/app/api:ro
      - ./migrations:/app/migrations:ro
    ports:
      - "8000:8000"
      - "5678:5678"   # debugpy port
